<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Registro diario | Planta de Hormigón</title>
  <style>
    :root{
      --bg:#0b1220;
      --surface:#0f1a2e;
      --surface2:#0c1628;
      --card:#101f37;
      --border:rgba(255,255,255,.08);
      --muted:rgba(255,255,255,.72);
      --text:rgba(255,255,255,.92);
      --accent:#4f8cff;
      --accent2:#79a7ff;
      --good:#22c55e;
      --warn:#f59e0b;
      --bad:#ef4444;
      --shadow: 0 10px 30px rgba(0,0,0,.35);
      --radius:16px;
      --radius2:22px;
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      --sans: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
    }
    *{ box-sizing:border-box; }
    html,body{ height:100%; }
    body{
      margin:0;
      font-family: var(--sans);
      color: var(--text);
      background:
        radial-gradient(1200px 600px at 15% 10%, rgba(79,140,255,.25), transparent 60%),
        radial-gradient(900px 500px at 85% 20%, rgba(121,167,255,.18), transparent 55%),
        radial-gradient(900px 600px at 55% 95%, rgba(34,197,94,.10), transparent 60%),
        linear-gradient(180deg, var(--bg), #070b14 70%);
      letter-spacing:.2px;
    }
    a{ color:inherit; text-decoration:none; }
    .app{
      min-height:100%;
      display:grid;
      grid-template-columns: 280px 1fr;
    }
    .sidebar{
      padding:22px 18px;
      background: linear-gradient(180deg, rgba(15,26,46,.95), rgba(12,22,40,.88));
      border-right: 1px solid var(--border);
      position: sticky;
      top:0;
      height:100vh;
    }
    .brand{
      display:flex;
      align-items:center;
      gap:12px;
      padding:10px 10px 16px 10px;
      border-bottom:1px solid var(--border);
      margin-bottom:16px;
    }
    .logo{
      width:38px;height:38px;border-radius:12px;
      background: radial-gradient(circle at 30% 30%, rgba(121,167,255,.85), rgba(79,140,255,.55) 45%, rgba(34,197,94,.25));
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.10);
    }
    .brand h1{
      margin:0;
      font-size:14px;
      font-weight:650;
      line-height:1.2;
    }
    .brand small{
      display:block;
      margin-top:3px;
      font-size:12px;
      color: var(--muted);
      font-weight:500;
    }

    .nav{
      display:flex;
      flex-direction:column;
      gap:8px;
      margin-top:14px;
    }
    .nav a{
      display:flex;
      align-items:center;
      gap:10px;
      padding:10px 12px;
      border-radius:14px;
      border:1px solid transparent;
      color:rgba(255,255,255,.86);
      background:transparent;
      transition: transform .12s ease, background .12s ease, border-color .12s ease;
    }
    .nav a:hover{
      background: rgba(255,255,255,.04);
      border-color: rgba(255,255,255,.08);
      transform: translateY(-1px);
    }
    .nav a.active{
      background: linear-gradient(180deg, rgba(79,140,255,.18), rgba(79,140,255,.08));
      border-color: rgba(79,140,255,.35);
    }
    .icon{
      width:18px; height:18px; flex:0 0 18px;
      opacity:.92;
    }
    .spacer{ flex:1; }
    .userbox{
      margin-top:18px;
      padding:14px 12px;
      border-radius: var(--radius);
      background: rgba(255,255,255,.03);
      border:1px solid var(--border);
    }
    .userline{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-bottom:10px;
    }
    .chip{
      font-family: var(--mono);
      font-size:11px;
      padding:5px 8px;
      border-radius: 999px;
      background: rgba(79,140,255,.14);
      border:1px solid rgba(79,140,255,.25);
      color: rgba(255,255,255,.90);
      white-space:nowrap;
    }
    .btn{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:10px 12px;
      border-radius: 14px;
      background: rgba(255,255,255,.04);
      border:1px solid var(--border);
      color: rgba(255,255,255,.92);
      cursor:pointer;
      transition: transform .12s ease, background .12s ease, border-color .12s ease;
      width:100%;
      justify-content:center;
      font-weight:600;
    }
    .btn:hover{
      transform: translateY(-1px);
      background: rgba(255,255,255,.06);
      border-color: rgba(255,255,255,.12);
    }
    .btn.danger{
      background: rgba(239,68,68,.10);
      border-color: rgba(239,68,68,.25);
    }

    .main{
      padding:26px 26px 40px 26px;
    }
    .topbar{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:18px;
      margin-bottom:18px;
    }
    .title h2{
      margin:0;
      font-size:22px;
      letter-spacing:.2px;
    }
    .title p{
      margin:8px 0 0 0;
      color: var(--muted);
      font-size:13px;
      max-width: 62ch;
      line-height:1.45;
    }
    .actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      justify-content:flex-end;
    }
    .pill{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:10px 12px;
      border-radius: 999px;
      border:1px solid var(--border);
      background: rgba(255,255,255,.03);
      font-weight:650;
      font-size:13px;
      cursor:pointer;
      transition: background .12s ease, transform .12s ease, border-color .12s ease;
      white-space:nowrap;
    }
    .pill:hover{
      transform: translateY(-1px);
      background: rgba(255,255,255,.05);
      border-color: rgba(255,255,255,.12);
    }

    .page{padding: 18px;}
    .row{display:flex; gap:12px; flex-wrap:wrap;}
    .field{display:flex; flex-direction:column; gap:6px; min-width:220px; flex:1;}
    label{font-size:12px;color:var(--muted);}
    input, select, textarea{
      width:100%;
      border:1px solid var(--border);
      background: rgba(255,255,255,.04);
      color: var(--text);
      border-radius: 14px;
      padding: 10px 12px;
      outline:none;
      transition: border-color .15s ease, box-shadow .15s ease, background .15s ease;
    }
    input::placeholder, textarea::placeholder{color: rgba(255,255,255,.45);}
    input:focus, select:focus, textarea:focus{
      border-color: rgba(79,140,255,.45);
      box-shadow: 0 0 0 4px rgba(79,140,255,.18);
      background: rgba(255,255,255,.06);
    }

    .card{
      border-radius: var(--radius2);
      background: linear-gradient(180deg, rgba(16,31,55,.92), rgba(12,22,40,.92));
      border:1px solid var(--border);
      box-shadow: var(--shadow);
      padding:16px 16px 14px 16px;
      overflow:hidden;
      position:relative;
    }
    .card::after{
      content:"";
      position:absolute;
      inset:-1px;
      background: radial-gradient(800px 220px at 20% 0%, rgba(79,140,255,.12), transparent 60%);
      pointer-events:none;
    }

    .table-wrap{
      overflow:auto;
      border:1px solid var(--border);
      border-radius: var(--radius2);
      background: rgba(255,255,255,.03);
      box-shadow: var(--shadow);
    }
    table{width:100%; border-collapse:collapse; min-width: 820px;}
    thead th{
      position:sticky; top:0; z-index:1;
      text-align:left;
      font-size:12px;
      color: var(--muted);
      background: rgba(255,255,255,.04);
      border-bottom:1px solid var(--border);
      padding: 12px 14px;
    }
    tbody td{
      padding: 12px 14px;
      border-bottom:1px solid var(--border);
      vertical-align:top;
      font-size: 14px;
    }
    tbody tr:hover{ background: rgba(79,140,255,.06); }

    .badge{
      display:inline-flex; align-items:center; gap:8px;
      font-size: 12px; font-weight: 700;
      padding: 6px 10px;
      border-radius: 999px;
      border:1px solid var(--border);
      background: rgba(255,255,255,.03);
      white-space:nowrap;
    }

    /* Para que el dropdown se vea */
    select option{
      color:#0f172a;
      background:#ffffff;
    }

    @media (max-width: 980px){
      .app{ grid-template-columns: 1fr; }
      .sidebar{ position:relative; height:auto; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <div class="logo" aria-hidden="true"></div>
        <div>
          <h1>Planta de Hormigón</h1>
          <small>Control de producción & inventario</small>
        </div>
      </div>

      <!-- IMPORTANTE: rutas Flask, no .html -->
      <nav class="nav" aria-label="Navegación">
        <a href="/dashboard" id="navDashboard">
          <svg class="icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M3 13.5V21h7v-7.5H3Z" stroke="currentColor" stroke-width="1.8"/>
            <path d="M14 3v9h7V3h-7Z" stroke="currentColor" stroke-width="1.8"/>
            <path d="M14 14.5V21h7v-6.5h-7Z" stroke="currentColor" stroke-width="1.8"/>
            <path d="M3 3v8h7V3H3Z" stroke="currentColor" stroke-width="1.8"/>
          </svg>
          Dashboard
        </a>

        <a class="active" href="/registro" id="navRegistro" aria-current="page">
          <svg class="icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M7 4h10a2 2 0 0 1 2 2v14H7a2 2 0 0 0-2 2V6a2 2 0 0 1 2-2Z" stroke="currentColor" stroke-width="1.8"/>
            <path d="M9 9h8M9 13h8M9 17h5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
          Registro diario
        </a>

        <a href="/inventario" id="navInventario">
          <svg class="icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M21 8l-9-5-9 5 9 5 9-5Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
            <path d="M3 8v10l9 5 9-5V8" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
            <path d="M12 13v10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
          Inventario
        </a>

        <a href="/historial" id="navHistorial">
          <svg class="icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M7 6h14M7 12h14M7 18h14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            <path d="M3.5 6h.5M3.5 12h.5M3.5 18h.5" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
          </svg>
          Historial
        </a>
      </nav>

      <div class="spacer"></div>

      <div class="userbox">
        <div class="userline">
          <div>
            <div style="font-size:12px;color:var(--muted);margin-bottom:6px;">Sesión</div>
            <div id="lblUser" class="chip">Sin usuario</div>
          </div>
          <div class="chip" id="todayChip">—</div>
        </div>

        <button class="btn danger" id="btnLogout" type="button">
          <svg class="icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M10 7V6a2 2 0 0 1 2-2h7v16h-7a2 2 0 0 1-2-2v-1" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            <path d="M14 12H4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            <path d="M7 9l-3 3 3 3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Cerrar sesión
        </button>
      </div>
    </aside>

    <main class="main">
      <div class="topbar">
        <div class="title">
          <h2>Registro diario</h2>
          <p>Selecciona el diseño y el volumen producido; el sistema guarda el despacho en la base de datos.</p>
        </div>

        <div class="actions">
          <a class="pill" href="/inventario" title="Ver inventario">
            <svg class="icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M3 7h18M6 7v14h12V7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
              <path d="M9 7V5a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            </svg>
            Inventario
          </a>

          <a class="pill" href="/historial" title="Ver historial">
            <svg class="icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M12 8v5l3 2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M21 12a9 9 0 1 1-3.1-6.8" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
              <path d="M21 3v6h-6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            Historial
          </a>
        </div>
      </div>

      <div class="page">
        <div class="card">
          <h3 style="margin:0 0 10px; font-size:14px; position:relative;">Registro de Consumo Diario</h3>

          <!-- IMPORTANTE: el form debe llamarse registroForm para el registro.js -->
          <form id="registroForm" style="position:relative;">
            <div class="row">
              <div class="field">
                <label for="fecha">Fecha</label>
                <input id="fecha" type="date" required />
              </div>

              <div class="field">
                <label for="volumen_m3">Volumen producido (m³)</label>
                <input id="volumen_m3" type="number" step="0.01" min="0" required placeholder="Ej: 120.5" />
              </div>

              <div class="field">
                <label for="turno">Turno</label>
                <select id="turno" required>
                  <option value="">Seleccione turno</option>
                  <option value="Diurno">Diurno</option>
                  <option value="Nocturno">Nocturno</option>
                </select>
              </div>
            </div>

            <div class="row" style="margin-top:12px;">
              <div class="field">
                <label for="diseno_mezcla">Diseño de mezcla</label>
                <select id="diseno_mezcla" required>
                  <option value="">Seleccione un diseño</option>
                </select>
              </div>

              <div class="field">
                <label for="wbs">WBS</label>
                <input id="wbs" type="text" required placeholder="Ej: 1.2.3.04.005" />
              </div>

              <div class="field">
                <label for="zona">Destino de la producción</label>
                <input id="zona" type="text" required placeholder="Ej: Shotcrete UG / Plataforma / Fundaciones" />
              </div>
            </div>

            <div class="row" style="margin-top:12px;">
              <div class="field">
                <label for="arena_humedad_pct">Humedad de la arena (%)</label>
                <input id="arena_humedad_pct" type="number" step="0.1" min="0" placeholder="Ej: 6.5" />
              </div>
              <div class="field">
                <label for="asentamiento_final_cm">Asentamiento final (cm)</label>
                <input id="asentamiento_final_cm" type="number" step="0.1" min="0" placeholder="Ej: 18" />
              </div>
              <div class="field">
                <label for="temperatura_c">Temperatura de la mezcla (°C)</label>
                <input id="temperatura_c" type="number" step="0.1" placeholder="Ej: 22.3" />
              </div>
            </div>

            <div class="row" style="justify-content:flex-end; margin-top:14px;">
              <button class="btn" type="submit">Guardar registro</button>
            </div>
          </form>
        </div>
      </div>
    </main>
  </div>

  <!-- Sesión simple (opcional, no rompe nada) -->
  <script>
    (function(){
      const LS_USER = "ph_user";
      const u = localStorage.getItem(LS_USER);
      const lbl = document.getElementById("lblUser");
      const today = document.getElementById("todayChip");
      if (today) today.textContent = new Date().toISOString().slice(0,10);
      if (lbl){
        try {
          const obj = u ? JSON.parse(u) : null;
          lbl.textContent = (obj && (obj.nombre || obj.usuario || obj.user)) ? (obj.nombre || obj.usuario || obj.user) : "Sin usuario";
        } catch {
          lbl.textContent = "Sin usuario";
        }
      }
      const btnLogout = document.getElementById("btnLogout");
      if (btnLogout){
        btnLogout.addEventListener("click", () => {
          localStorage.removeItem(LS_USER);
          window.location.href = "/login";
        });
      }
    })();
  </script>

  <!-- IMPORTANTE: cargar el JS que llena diseños y hace POST -->
  <script src="/static/js/registro.js"></script>
</body>
</html>
