<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Login | Planta de Hormigón</title>
  <style>
    :root{
      --bg:#0b1220;
      --surface:#0f1a2e;
      --surface2:#0c1628;
      --card:#101f37;
      --border:rgba(255,255,255,.08);
      --muted:rgba(255,255,255,.72);
      --text:rgba(255,255,255,.92);
      --accent:#4f8cff;
      --accent2:#79a7ff;
      --good:#22c55e;
      --warn:#f59e0b;
      --bad:#ef4444;
      --shadow: 0 10px 30px rgba(0,0,0,.35);
      --radius:16px;
      --radius2:22px;
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      --sans: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
    }
    *{ box-sizing:border-box; }
    html,body{ height:100%; }
    body{
      margin:0;
      font-family: var(--sans);
      color: var(--text);
      background:
        radial-gradient(1200px 600px at 15% 10%, rgba(79,140,255,.25), transparent 60%),
        radial-gradient(900px 500px at 85% 20%, rgba(121,167,255,.18), transparent 55%),
        radial-gradient(900px 600px at 55% 95%, rgba(34,197,94,.10), transparent 60%),
        linear-gradient(180deg, var(--bg), #070b14 70%);
      letter-spacing:.2px;
    }
    a{ color:inherit; text-decoration:none; }
    .app{
      min-height:100%;
      display:grid;
      grid-template-columns: 280px 1fr;
    }
    .sidebar{
      padding:22px 18px;
      background: linear-gradient(180deg, rgba(15,26,46,.95), rgba(12,22,40,.88));
      border-right: 1px solid var(--border);
      position: sticky;
      top:0;
      height:100vh;
    }
    .brand{
      display:flex;
      align-items:center;
      gap:12px;
      padding:10px 10px 16px 10px;
      border-bottom:1px solid var(--border);
      margin-bottom:16px;
    }
    .logo{
      width:38px;height:38px;border-radius:12px;
      background: radial-gradient(circle at 30% 30%, rgba(121,167,255,.85), rgba(79,140,255,.55) 45%, rgba(34,197,94,.25));
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.10);
    }
    .brand h1{
      margin:0;
      font-size:14px;
      font-weight:650;
      line-height:1.2;
    }
    .brand small{
      display:block;
      margin-top:3px;
      font-size:12px;
      color: var(--muted);
      font-weight:500;
    }

    .nav{
      display:flex;
      flex-direction:column;
      gap:8px;
      margin-top:14px;
    }
    .nav a{
      display:flex;
      align-items:center;
      gap:10px;
      padding:10px 12px;
      border-radius:14px;
      border:1px solid transparent;
      color:rgba(255,255,255,.86);
      background:transparent;
      transition: transform .12s ease, background .12s ease, border-color .12s ease;
    }
    .nav a:hover{
      background: rgba(255,255,255,.04);
      border-color: rgba(255,255,255,.08);
      transform: translateY(-1px);
    }
    .nav a.active{
      background: linear-gradient(180deg, rgba(79,140,255,.18), rgba(79,140,255,.08));
      border-color: rgba(79,140,255,.35);
    }
    .icon{
      width:18px; height:18px; flex:0 0 18px;
      opacity:.92;
    }
    .spacer{ flex:1; }
    .userbox{
      margin-top:18px;
      padding:14px 12px;
      border-radius: var(--radius);
      background: rgba(255,255,255,.03);
      border:1px solid var(--border);
    }
    .userline{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-bottom:10px;
    }
    .chip{
      font-family: var(--mono);
      font-size:11px;
      padding:5px 8px;
      border-radius: 999px;
      background: rgba(79,140,255,.14);
      border:1px solid rgba(79,140,255,.25);
      color: rgba(255,255,255,.90);
      white-space:nowrap;
    }
    .btn{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:10px 12px;
      border-radius: 14px;
      background: rgba(255,255,255,.04);
      border:1px solid var(--border);
      color: rgba(255,255,255,.92);
      cursor:pointer;
      transition: transform .12s ease, background .12s ease, border-color .12s ease;
      width:100%;
      justify-content:center;
      font-weight:600;
    }
    .btn:hover{
      transform: translateY(-1px);
      background: rgba(255,255,255,.06);
      border-color: rgba(255,255,255,.12);
    }
    .btn.danger{
      background: rgba(239,68,68,.10);
      border-color: rgba(239,68,68,.25);
    }

    /* Main */
    .main{
      padding:26px 26px 40px 26px;
    }
    .topbar{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:18px;
      margin-bottom:18px;
    }
    .title h2{
      margin:0;
      font-size:22px;
      letter-spacing:.2px;
    }
    .title p{
      margin:8px 0 0 0;
      color: var(--muted);
      font-size:13px;
      max-width: 62ch;
      line-height:1.45;
    }
    .actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      justify-content:flex-end;
    }
    .pill{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:10px 12px;
      border-radius: 999px;
      border:1px solid var(--border);
      background: rgba(255,255,255,.03);
      font-weight:650;
      font-size:13px;
      cursor:pointer;
      transition: background .12s ease, transform .12s ease, border-color .12s ease;
      white-space:nowrap;
    }
    .pill:hover{
      transform: translateY(-1px);
      background: rgba(255,255,255,.05);
      border-color: rgba(255,255,255,.12);
    }

    .grid{
      display:grid;
      grid-template-columns: repeat(12, 1fr);
      gap:14px;
      margin-top:14px;
    }
    .card{
      grid-column: span 4;
      border-radius: var(--radius2);
      background: linear-gradient(180deg, rgba(16,31,55,.92), rgba(12,22,40,.92));
      border:1px solid var(--border);
      box-shadow: var(--shadow);
      padding:16px 16px 14px 16px;
      overflow:hidden;
      position:relative;
    }
    .card::after{
      content:"";
      position:absolute;
      inset:-1px;
      background: radial-gradient(800px 220px at 20% 0%, rgba(79,140,255,.12), transparent 60%);
      pointer-events:none;
    }
    .card h3{
      margin:0 0 10px 0;
      font-size:13px;
      color: rgba(255,255,255,.86);
      font-weight:650;
      letter-spacing:.2px;
      position:relative;
    }
    .kpi{
      display:flex;
      align-items:baseline;
      justify-content:space-between;
      gap:12px;
      position:relative;
    }
    .kpi .value{
      font-size:28px;
      font-weight:750;
      letter-spacing:.2px;
    }
    .kpi .sub{
      font-size:12px;
      color: var(--muted);
      margin-top:6px;
      line-height:1.35;
    }
    .trend{
      font-family: var(--mono);
      font-size:12px;
      padding:6px 10px;
      border-radius: 999px;
      border:1px solid var(--border);
      background: rgba(255,255,255,.03);
      color: rgba(255,255,255,.88);
      white-space:nowrap;
      position:relative;
    }
    .trend.good{ border-color: rgba(34,197,94,.30); background: rgba(34,197,94,.10); }
    .trend.warn{ border-color: rgba(245,158,11,.30); background: rgba(245,158,11,.10); }
    .trend.bad{ border-color: rgba(239,68,68,.30); background: rgba(239,68,68,.10); }

    .wide{
      grid-column: span 8;
      padding:16px;
    }
    .panel{
      border-radius: var(--radius2);
      background: rgba(255,255,255,.03);
      border:1px solid var(--border);
      padding:14px;
      position:relative;
      overflow:hidden;
    }
    .panel h4{
      margin:0 0 12px 0;
      font-size:13px;
      font-weight:700;
      color: rgba(255,255,255,.88);
      letter-spacing:.2px;
    }
    .table{
      width:100%;
      border-collapse: collapse;
      font-size:13px;
    }
    .table th, .table td{
      padding:10px 10px;
      border-bottom:1px solid rgba(255,255,255,.06);
      text-align:left;
      vertical-align:top;
    }
    .table th{
      color: rgba(255,255,255,.72);
      font-weight:650;
      font-size:12px;
      letter-spacing:.2px;
    }
    .badge{
      display:inline-flex;
      align-items:center;
      gap:6px;
      padding:6px 10px;
      border-radius:999px;
      border:1px solid var(--border);
      background: rgba(255,255,255,.03);
      font-size:12px;
      font-family: var(--mono);
    }
    .dot{
      width:8px;height:8px;border-radius:99px;
      background: rgba(255,255,255,.35);
      box-shadow: 0 0 0 2px rgba(255,255,255,.08);
    }
    .dot.good{ background: var(--good); }
    .dot.warn{ background: var(--warn); }
    .dot.bad{ background: var(--bad); }

    .toast{
      position: fixed;
      right: 18px;
      bottom: 18px;
      max-width: 360px;
      display:none;
      z-index: 9999;
    }
    .toast .inner{
      padding:12px 12px;
      border-radius: 16px;
      background: rgba(15,26,46,.95);
      border:1px solid var(--border);
      box-shadow: var(--shadow);
      display:flex;
      gap:10px;
      align-items:flex-start;
    }
    .toast .inner b{ display:block; margin-bottom:4px; }
    .toast .inner p{ margin:0; color: var(--muted); font-size:13px; line-height:1.35; }

    @media (max-width: 980px){
      .app{ grid-template-columns: 1fr; }
      .sidebar{ position:relative; height:auto; }
      .grid{ grid-template-columns: repeat(6, 1fr); }
      .card{ grid-column: span 3; }
      .wide{ grid-column: span 6; }
    }
    @media (max-width: 620px){
      .grid{ grid-template-columns: repeat(2, 1fr); }
      .card{ grid-column: span 2; }
      .wide{ grid-column: span 2; }
      .actions{ justify-content:flex-start; }
    }
  


.page{padding: 18px;}
.row{display:flex; gap:12px; flex-wrap:wrap;}
.field{display:flex; flex-direction:column; gap:6px; min-width:220px; flex:1;}
label{font-size:12px;color:var(--muted);}
input, select, textarea{
  width:100%;
  border:1px solid var(--border);
  background: rgba(255,255,255,.04);
  color: var(--text);
  border-radius: 14px;
  padding: 10px 12px;
  outline:none;
  transition: border-color .15s ease, box-shadow .15s ease, background .15s ease;
}
input::placeholder, textarea::placeholder{color: rgba(255,255,255,.45);}
input:focus, select:focus, textarea:focus{
  border-color: rgba(79,140,255,.45);
  box-shadow: 0 0 0 4px rgba(79,140,255,.18);
  background: rgba(255,255,255,.06);
}
.table-wrap{
  overflow:auto;
  border:1px solid var(--border);
  border-radius: var(--radius2);
  background: rgba(255,255,255,.03);
  box-shadow: var(--shadow);
}
table{width:100%; border-collapse:collapse; min-width: 820px;}
thead th{
  position:sticky; top:0; z-index:1;
  text-align:left;
  font-size:12px;
  color: var(--muted);
  background: rgba(255,255,255,.04);
  border-bottom:1px solid var(--border);
  padding: 12px 14px;
}
tbody td{
  padding: 12px 14px;
  border-bottom:1px solid var(--border);
  vertical-align:top;
  font-size: 14px;
}
tbody tr:hover{ background: rgba(79,140,255,.06); }
.badge{
  display:inline-flex; align-items:center; gap:8px;
  font-size: 12px; font-weight: 700;
  padding: 6px 10px;
  border-radius: 999px;
  border:1px solid var(--border);
  background: rgba(255,255,255,.03);
  white-space:nowrap;
}
.badge.ok{ border-color: rgba(34,197,94,.35); color: rgba(34,197,94,.95); background: rgba(34,197,94,.08); }
.badge.low{ border-color: rgba(245,158,11,.35); color: rgba(245,158,11,.95); background: rgba(245,158,11,.10); }
.badge.critical{ border-color: rgba(239,68,68,.35); color: rgba(239,68,68,.95); background: rgba(239,68,68,.10); }

.alert{
  border:1px solid var(--border);
  border-left: 6px solid var(--accent);
  background: rgba(255,255,255,.03);
  border-radius: var(--radius2);
  padding: 12px 14px;
  box-shadow: var(--shadow);
  color: var(--text);
  font-size: 13px;
}
.alert.good{ border-left-color: var(--good); }
.alert.warn{ border-left-color: var(--warn); }
.alert.bad{ border-left-color: var(--bad); }
</style>
  
<style>
  body{background: radial-gradient(1200px 700px at 20% -10%, rgba(79,140,255,.25), transparent 55%),
                    radial-gradient(900px 600px at 100% 0%, rgba(34,197,94,.12), transparent 55%),
                    radial-gradient(800px 500px at 40% 110%, rgba(245,158,11,.10), transparent 55%),
                    var(--bg);}
  .auth-wrap{min-height:100vh;display:grid;place-items:center;padding:24px;}
  .auth-card{
    width:min(520px, 100%);
    background: rgba(16,31,55,.78);
    border:1px solid var(--border);
    border-radius: var(--radius2);
    box-shadow: var(--shadow);
    padding: 18px;
    backdrop-filter: blur(10px);
  }
  .auth-head{display:flex;align-items:center;gap:12px;}
  .auth-logo{
    width:46px;height:46px;border-radius: 16px;
    background: radial-gradient(circle at 30% 30%, rgba(121,167,255,.95), rgba(79,140,255,.75));
    display:grid;place-items:center;
    color: rgba(0,0,0,.65);
    font-weight: 900;
    letter-spacing:-.6px;
  }
  .auth-head h1{margin:0;font-size:16px;letter-spacing:-.2px;color:var(--text);}
  .auth-head p{margin:3px 0 0;font-size:13px;color:var(--muted);}
  .auth-note{
    margin-top:12px;
    border:1px dashed rgba(79,140,255,.35);
    background: rgba(79,140,255,.08);
    border-radius: var(--radius2);
    padding: 12px 14px;
    color: var(--text);
    font-size: 13px;
    line-height:1.35;
  }
  .auth-card .btn{width:100%;}
</style>

</head>
<body>
  <div class="auth-wrap">
    <div class="auth-card">
      <div class="auth-head">
        <div class="auth-logo" aria-hidden="true">PH</div>
        <div>
          <h1>Planta de Hormigón</h1>
          <p>Acceso al sistema (prototipo local)</p>
        </div>
      </div>
      <div class="auth-note">
        Ingresa tu Usuario y Contraseña
      </div>
      <form id="loginForm" >
      <div class="field">
        <label for="u">Usuario</label>
        <input id="u" type="text" required placeholder="Ej: pteran" />
      </div>
      <div class="field">
        <label for="p">Contraseña</label>
        <input id="p" type="password" required placeholder="••••••••" />
      </div>
      <div class="row" style="justify-content:flex-end; margin-top:14px;">
        <button class="btn" type="submit">Ingresar</button>
      </div>
      <div style="margin-top:10px; font-size:12px; color:var(--muted);">
        
      </div>
    </form>
    </div>
  </div>
  <script>

const LS_USER="ph_user";
function escapeHtml(s){ return String(s).replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;"); }
function toast(type, title, msg, ms=3500){
  const wrap = document.getElementById("toasts");
  const el = document.createElement("div");
  el.className = "toast " + (type || "");
  el.innerHTML = `<div style="min-width:0"><p class="t-title">${escapeHtml(title||"Aviso")}</p><p class="t-msg">${escapeHtml(msg||"")}</p></div><button class="x" type="button" aria-label="Cerrar">×</button>`;
  el.querySelector(".x").addEventListener("click", () => el.remove());
  wrap.appendChild(el);
  window.setTimeout(() => { if (el.isConnected) el.remove(); }, ms);
}
// Login real contra /api/login (Juan Ruiz @eljuandaruiz).
// Ya no se confía en el cliente: el servidor valida credenciales, rol,
// intentos fallidos y abre la sesión segura de Flask.
document.getElementById("loginForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  const usuario = document.getElementById("u").value.trim();
  const pass = document.getElementById("p").value;
  if(!usuario || !pass){ alert("Ingresa usuario y contraseña."); return; }

  try {
    const resp = await fetch("/api/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ usuario, password: pass }),
    });
    const data = await resp.json();

    if (!resp.ok || !data.ok) {
      alert(data.error || "No se pudo iniciar sesión.");
      return;
    }

    // Guardamos solo datos públicos para mostrar en la interfaz.
    localStorage.setItem(LS_USER, JSON.stringify(data.usuario));
    window.location.href = "/dashboard";
  } catch (err) {
    alert("Error de conexión con el servidor.");
  }
});

</script>
</body>
</html>
