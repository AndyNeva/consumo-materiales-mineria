<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Inventario | Planta de Hormigón</title>

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
  color:#e6edf7;
  background:
    radial-gradient(1200px 800px at 20% -10%, #1b3a6b 0%, #0b1220 45%, #050914 100%);
}

/* ===== LAYOUT ===== */
.app{
  display:grid;
  grid-template-columns:260px 1fr;
  min-height:100vh;
}

/* ===== SIDEBAR ===== */
aside{
  padding:20px;
  background:linear-gradient(180deg,rgba(20,33,61,.95),rgba(8,14,30,.95));
  display:flex;
  flex-direction:column;
}
.brand{
  font-weight:600;
  margin-bottom:4px;
}
.brand-sub{
  opacity:.7;
  font-size:14px;
  margin-bottom:18px;
}
.nav a{
  display:flex;
  align-items:center;
  gap:10px;
  padding:10px 14px;
  margin-bottom:6px;
  border-radius:12px;
  color:#e6edf7;
  text-decoration:none;
  background:rgba(255,255,255,.02);
}
.nav a.active{
  background:linear-gradient(90deg,#1f3b6d,#162a4f);
}
.nav a:hover{
  background:rgba(255,255,255,.06);
}
.logout{
  margin-top:auto;
}
.logout button{
  width:100%;
  padding:10px;
  border-radius:14px;
  border:0;
  background:#7f1d1d;
  color:#fff;
  cursor:pointer;
}
.logout button:hover{background:#991b1b}

/* ===== MAIN ===== */
main{
  padding:24px 28px;
}
h1{margin:0 0 6px}
.subtitle{opacity:.7;margin-bottom:18px}

.card{
  background:linear-gradient(180deg,rgba(20,33,61,.85),rgba(10,18,35,.85));
  border-radius:18px;
  padding:14px;
}

/* ===== TABLE ===== */
table{
  width:100%;
  border-collapse:collapse;
}
thead th{
  text-align:left;
  padding:12px;
  background:linear-gradient(180deg,rgba(40,64,110,.9),rgba(28,46,86,.9));
}
tbody td{
  padding:12px;
  border-top:1px solid rgba(255,255,255,.08);
}
tbody tr:nth-child(even){
  background:rgba(10,18,35,.6);
}

/* ===== BADGES ===== */
.badge{
  padding:4px 10px;
  border-radius:999px;
  font-size:12px;
  display:inline-block;
}
.ok{
  background:rgba(34,197,94,.18);
  color:#4ade80;
}
.low{
  background:rgba(245,158,11,.18);
  color:#f59e0b;
}

/* ===== BUTTON ===== */
.btn{
  background:#1f3b6d;
  color:#fff;
  border:0;
  padding:6px 14px;
  border-radius:12px;
  cursor:pointer;
}
.btn:hover{background:#2a4c88}
</style>
</head>

<body>
<div class="app">

<!-- ===== SIDEBAR ===== -->
<aside>
  <div class="brand">Planta de Hormigón</div>
  <div class="brand-sub">Control de producción & inventario</div>

  <nav class="nav">
    <a href="/dashboard">Dashboard</a>
    <a href="/registro">Registro diario</a>
    <a href="/inventario" class="active">Inventario</a>
    <a href="/historial">Historial</a>
    <a href="/graficas">Gráficas</a>
  </nav>

  <div class="logout">
    <button type="button">Cerrar sesión</button>
  </div>
</aside>

<!-- ===== MAIN ===== -->
<main>
  <h1>Inventario</h1>
  <div class="subtitle">
    Administra materiales, mínimos y stocks. El estado cambia automáticamente.
  </div>

  <div class="card">
    <table>
      <thead>
        <tr>
          <th>Material</th>
          <th>Unidad</th>
          <th>Stock actual</th>
          <th>Mínimo</th>
          <th>Estado</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</main>

</div>

<script>

const KEY = "ph_inventario";

const PRELOAD = [
 {material:"RHEO 1000",unidad:"kg",stock:981.64,minimo:500},
 {material:"Sika 115",unidad:"kg",stock:800,minimo:300},
 {material:"BASF 719",unidad:"kg",stock:582.64,minimo:250},
 {material:"Sika 200",unidad:"kg",stock:700,minimo:300},
 {material:"Delvo",unidad:"litros",stock:112.82,minimo:50},
 {material:"MasterGlenium 7950",unidad:"kg",stock:381.02,minimo:150},
 {material:"MasterGlenium 7970",unidad:"kg",stock:400,minimo:150},
 {material:"Sika PP 48 - BARCHIP",unidad:"kg",stock:200,minimo:80},
 {material:"Cemento HE",unidad:"kg",stock:1823,minimo:10000},
 {material:"Cemento IP",unidad:"kg",stock:0,minimo:0},
 {material:"Agua",unidad:"kg",stock:999999548.56,minimo:100},
 {material:"Arena",unidad:"kg",stock:13108,minimo:1600},
 {material:"Grava",unidad:"kg",stock:8200,minimo:820}
];

let data = JSON.parse(localStorage.getItem(KEY)) || PRELOAD;
localStorage.setItem(KEY, JSON.stringify(data));

function estado(it){
  if(Number(it.stock) <= Number(it.minimo)) return {t:"Bajo",c:"low"};
  return {t:"OK",c:"ok"};
}

function render(){
  const tb=document.getElementById("tbody");
  tb.innerHTML="";
  data.forEach((it,i)=>{
    const e=estado(it);
    tb.innerHTML+=`
      <tr>
        <td>${it.material}</td>
        <td>${it.unidad}</td>
        <td>${it.stock}</td>
        <td>${it.minimo}</td>
        <td><span class="badge ${e.c}">${e.t}</span></td>
        <td><button class="btn" onclick="edit(${i})">Editar</button></td>
      </tr>`;
  });
}

function edit(i){
  const s=prompt("Nuevo stock:",data[i].stock);
  const m=prompt("Nuevo mínimo:",data[i].minimo);
  if(s!==null && m!==null){
    data[i].stock=Number(s);
    data[i].minimo=Number(m);
    localStorage.setItem(KEY,JSON.stringify(data));
    render();
  }
}

render();
</script>
</body>
</html>
